<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Voting System - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#FF9933,#ffffff,#138808);
}

.container{
width:370px;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.3);
text-align:center;
}

.logo{
font-size:55px;
}

h1{
margin:10px 0;
color:#0b5394;
}

p{
color:gray;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#0b5394;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#063970;
}

.signup{
margin-top:20px;
}

.signup a{
text-decoration:none;
color:#0b5394;
font-weight:bold;
}

#msg{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🗳️</div>

<h1>India Voting System</h1>

<p>Login to Continue</p>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<div class="signup">
Don't have an account?
<a href="signup.html">
Signup
</a>
</div>

<div id="msg"></div>

</div>

<script>

const API="http://localhost:5000/api";

async function login(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(email===""||password===""){
document.getElementById("msg").style.color="red";
document.getElementById("msg").innerHTML="Please fill all fields";
return;
}

try{

const response=await fetch(API+"/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email,
password

})

});

const data=await response.json();

if(response.ok){

localStorage.setItem("token",data.token);

document.getElementById("msg").style.color="green";
document.getElementById("msg").innerHTML="Login Successful";

setTimeout(()=>{

window.location.href="candidates.html";

},1000);

}

else{

document.getElementById("msg").style.color="red";
document.getElementById("msg").innerHTML=data.message;

}

}

catch(err){

document.getElementById("msg").style.color="red";
document.getElementById("msg").innerHTML="Server Not Running";

}

}

</script>

</body>
</html>
