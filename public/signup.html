<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Voting System - Signup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#FF9933,#ffffff,#138808);
}

.container{
width:380px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.3);
text-align:center;
}

.logo{
font-size:55px;
}

h1{
margin:10px 0;
color:#0b5394;
}

p{
color:gray;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
outline:none;
}

input:focus{
border:1px solid #0b5394;
}

button{
width:100%;
padding:12px;
background:#138808;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0e6506;
}

.login{
margin-top:20px;
}

.login a{
text-decoration:none;
color:#0b5394;
font-weight:bold;
}

#msg{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🗳️</div>

<h1>India Voting System</h1>

<p>Create Your Account</p>

<input
type="text"
id="name"
placeholder="Enter Full Name">

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="signup()">
Signup
</button>

<div class="login">
Already have an account?
<a href="login.html">Login</a>
</div>

<div id="msg"></div>

</div>

<script>

const API = "http://localhost:5000/api";
async function signup(){

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(name==="" || email==="" || password===""){

document.getElementById("msg").style.color="red";
document.getElementById("msg").innerHTML="Please fill all fields";
return;

}

try{

const response=await fetch(API+"/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name,
email,
password

})

});

const data=await response.json();

if(response.ok){

document.getElementById("msg").style.color="green";
document.getElementById("msg").innerHTML="Signup Successful";

setTimeout(()=>{

window.location.href="login.html";

},1500);

}
else{

document.getElementById("msg").style.color="red";
document.getElementById("msg").innerHTML=data.message;

}

}
catch(error){

document.getElementById("msg").style.color="red";
document.getElementById("msg").innerHTML="Server Not Running";

}

}

</script>

</body>
</html>
