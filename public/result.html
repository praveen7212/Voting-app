<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Voting System - Results</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#0b5394;
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:28px;
}

button{
cursor:pointer;
border:none;
padding:10px 18px;
border-radius:6px;
font-size:16px;
}

.backBtn{
background:#138808;
color:white;
margin-right:10px;
}

.refreshBtn{
background:orange;
color:white;
margin-right:10px;
}

.logout{
background:red;
color:white;
}

.container{
width:90%;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
padding:20px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:120px;
height:120px;
object-fit:contain;
}

.card h2{
margin-top:15px;
color:#0b5394;
}

.card p{
margin:10px 0;
font-size:18px;
}

.winner{
border:4px solid gold;
background:#fffbe6;
}

.badge{
display:inline-block;
margin-top:10px;
background:gold;
color:black;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
font-size:15px;
}

</style>

</head>
<body>

<header>

<h1>🏆 Election Results</h1>

<div>

<button class="backBtn" onclick="window.location='candidates.html'">
Candidates
</button>

<button class="refreshBtn" onclick="loadResults()">
Refresh
</button>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

</header>

<div class="container" id="resultContainer">

</div>

<script>

const API="http://localhost:5000/api";

const token=localStorage.getItem("token");

if(!token){
window.location="login.html";
}

function getImage(party){

party=party.toLowerCase();

if(party.includes("bjp")) return "images/bjp.png";

if(party.includes("congress")) return "images/congress.png";

if(party.includes("aap")) return "images/aap.png";

if(party.includes("sp")) return "images/sp.png";

return "images/default.png";

}

async function loadResults(){

try{

const response=await fetch(API+"/results",{

headers:{
Authorization:"Bearer "+token
}

});

const results=await response.json();

let html="";

results.forEach((candidate,index)=>{

html+=`

<div class="card ${index===0?'winner':''}">

<img src="${getImage(candidate.party)}">

<h2>${candidate.name}</h2>

<p><b>Party:</b> ${candidate.party}</p>

<p><b>Age:</b> ${candidate.age}</p>

<p><b>Total Votes:</b> ${candidate.voteCount}</p>

${index===0 ? '<div class="badge">🏆 Winner</div>' : ''}

</div>

`;

});

document.getElementById("resultContainer").innerHTML=html;

}

catch(err){

alert("Unable to Load Results");

}

}

function logout(){

localStorage.removeItem("token");

window.location="login.html";

}

loadResults();

</script>

</body>
</html>
